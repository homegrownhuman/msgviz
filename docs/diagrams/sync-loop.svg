<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">
  <!--
    Live iMessage sync loop (macOS).
    Shows the watcher → reader → resolver → DB → WebSocket fanout.
    Same palette as data-pipeline.svg.
  -->

  <style>
    .layer-bg { fill: rgba(120,140,180,0.06); stroke: rgba(120,140,180,0.25); }
    .label    { font-size: 11px; font-weight: 600; fill: #7e8aa6; letter-spacing: 1.5px; }
    .src      { fill: #1a3a5c; stroke: #4e9eef; stroke-width: 1.5; }
    .src-tx   { fill: #e8f3ff; }
    .work     { fill: #3a2a4a; stroke: #b97df0; stroke-width: 1.5; }
    .work-tx  { fill: #f3e8ff; }
    .resv     { fill: #2a3a2a; stroke: #6cc070; stroke-width: 1.5; }
    .resv-tx  { fill: #e6f5e6; }
    .store    { fill: #4a3a1a; stroke: #f0b050; stroke-width: 1.5; }
    .store-tx { fill: #fff3dc; }
    .api      { fill: #1a4a4a; stroke: #5cd0d0; stroke-width: 1.5; }
    .api-tx   { fill: #e0fafa; }
    .ui       { fill: #3a1a2a; stroke: #f06080; stroke-width: 1.5; }
    .ui-tx    { fill: #ffe0eb; }
    .title    { font-size: 13.5px; font-weight: 600; }
    .sub      { font-size: 10.5px; opacity: 0.78; }
    .arrow    { fill: none; stroke: #7e8aa6; stroke-width: 1.4; marker-end: url(#arrow); }
    .arrow-back { fill: none; stroke: #7e8aa6; stroke-width: 1.4; stroke-dasharray: 5 3; marker-end: url(#arrow); opacity: 0.7; }
    .annot    { font-size: 10.5px; fill: #7e8aa6; font-style: italic; }
    .caption  { font-size: 10.5px; fill: #7e8aa6; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7e8aa6"/>
    </marker>
  </defs>

  <text class="label" x="20" y="36">LIVE iMESSAGE SYNC — runs every ~1.5 seconds in the background</text>

  <!-- 1. chat.db on disk -->
  <rect class="src" x="20" y="60" width="180" height="80" rx="6"/>
  <text class="title src-tx" x="36" y="86">~/Library/Messages</text>
  <text class="title src-tx" x="36" y="104">chat.db</text>
  <text class="sub src-tx" x="36" y="122">Apple's live DB</text>
  <text class="sub src-tx" x="36" y="135">WAL — readable concurrently</text>

  <!-- 2. watcher -->
  <rect class="work" x="250" y="60" width="180" height="80" rx="6"/>
  <text class="title work-tx" x="266" y="86">File watcher</text>
  <text class="sub work-tx" x="266" y="105">fsevents on chat.db-wal</text>
  <text class="sub work-tx" x="266" y="120">debounced 500 ms</text>
  <text class="sub work-tx" x="266" y="135">background thread</text>

  <!-- 3. reader / iter_messages -->
  <rect class="work" x="480" y="60" width="180" height="80" rx="6"/>
  <text class="title work-tx" x="496" y="86">IMessageLive</text>
  <text class="title work-tx" x="496" y="104">Adapter</text>
  <text class="sub work-tx" x="496" y="122">SELECT … WHERE</text>
  <text class="sub work-tx" x="496" y="135">ROWID &gt; last_seen</text>

  <!-- 4. resolver -->
  <rect class="resv" x="710" y="60" width="180" height="80" rx="6"/>
  <text class="title resv-tx" x="726" y="86">PersonResolver</text>
  <text class="sub resv-tx" x="726" y="105">handle → person</text>
  <text class="sub resv-tx" x="726" y="120">cache hits 99.9 %</text>
  <text class="sub resv-tx" x="726" y="135">creates new persons</text>

  <!-- 5. media kit -->
  <rect class="resv" x="710" y="180" width="180" height="80" rx="6"/>
  <text class="title resv-tx" x="726" y="206">Media kit</text>
  <text class="sub resv-tx" x="726" y="225">copy attachment</text>
  <text class="sub resv-tx" x="726" y="240">SHA-256 + thumbnail</text>
  <text class="sub resv-tx" x="726" y="255">→ media/&lt;kind&gt;/…</text>

  <!-- 6. DB write -->
  <rect class="store" x="480" y="180" width="180" height="80" rx="6"/>
  <text class="title store-tx" x="496" y="206">SQLite</text>
  <text class="sub store-tx" x="496" y="225">INSERT message,</text>
  <text class="sub store-tx" x="496" y="240">media; UPDATE</text>
  <text class="sub store-tx" x="496" y="255">source_ref last_seen</text>

  <!-- 7. WebSocket fanout -->
  <rect class="api" x="250" y="180" width="180" height="80" rx="6"/>
  <text class="title api-tx" x="266" y="206">WebSocket fanout</text>
  <text class="sub api-tx" x="266" y="225">{"type": "update",</text>
  <text class="sub api-tx" x="266" y="240"> "chats": […], "new": 1}</text>
  <text class="sub api-tx" x="266" y="255">all open clients</text>

  <!-- 8. UI -->
  <rect class="ui" x="20" y="180" width="180" height="80" rx="6"/>
  <text class="title ui-tx" x="36" y="206">Browser tab</text>
  <text class="sub ui-tx" x="36" y="225">unread badge increments</text>
  <text class="sub ui-tx" x="36" y="240">open chat appends</text>
  <text class="sub ui-tx" x="36" y="255">new bubble in place</text>

  <!-- Arrows: 1 → 2 → 3 → 4 -->
  <path class="arrow" d="M 200 100 L 250 100"/>
  <text class="annot" x="205" y="92">notify</text>

  <path class="arrow" d="M 430 100 L 480 100"/>
  <text class="annot" x="437" y="92">read</text>

  <path class="arrow" d="M 660 100 L 710 100"/>
  <text class="annot" x="668" y="92">resolve</text>

  <!-- 4 → 5 (downward) -->
  <path class="arrow" d="M 800 140 L 800 180"/>
  <text class="annot" x="810" y="165">+ media</text>

  <!-- 5/4 → 6 (DB write) -->
  <path class="arrow" d="M 710 220 L 660 220"/>

  <!-- 6 → 7 -->
  <path class="arrow" d="M 480 220 L 430 220"/>

  <!-- 7 → 8 -->
  <path class="arrow" d="M 250 220 L 200 220"/>
  <text class="annot" x="207" y="212">push</text>

  <!-- Loop back: watcher polls again -->
  <path class="arrow-back" d="M 340 180 Q 340 350 340 360 L 340 380"/>
  <path class="arrow-back" d="M 340 380 L 340 410"/>
  <text class="annot" x="350" y="420">…and wait for the next chat.db-wal event</text>

  <!-- Stages numbered -->
  <circle cx="20" cy="60" r="11" fill="#7e8aa6" stroke="none"/>
  <text x="20" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">1</text>
  <circle cx="250" cy="60" r="11" fill="#7e8aa6"/>
  <text x="250" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">2</text>
  <circle cx="480" cy="60" r="11" fill="#7e8aa6"/>
  <text x="480" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">3</text>
  <circle cx="710" cy="60" r="11" fill="#7e8aa6"/>
  <text x="710" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">4</text>
  <circle cx="710" cy="180" r="11" fill="#7e8aa6"/>
  <text x="710" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">5</text>
  <circle cx="480" cy="180" r="11" fill="#7e8aa6"/>
  <text x="480" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">6</text>
  <circle cx="250" cy="180" r="11" fill="#7e8aa6"/>
  <text x="250" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">7</text>
  <circle cx="20" cy="180" r="11" fill="#7e8aa6"/>
  <text x="20" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#0f1115">8</text>
</svg>
